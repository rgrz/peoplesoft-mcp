- description: >
    Select the current JOB record for an employee
  sql: |
    SELECT * 
    FROM PS_JOB A 
    WHERE A.EMPL_RCD = (SELECT MAX(A1.EMPL_RCD) FROM PS_JOB A1 WHERE A.EMPLID =A1.EMPLID) 
    AND A.EFFDT = (SELECT MAX(A2.EFFDT) FROM PS_JOB A2 WHERE A.EMPLID = A2.EMPLID AND A.EMPL_RCD = A2.EMPL_RCD) 
    AND A.EFFSEQ = (SELECT MAX(A3.EFFSEQ) FROM PS_JOB A3 WHERE A.EMPLID = A3.EMPLID AND A.EMPL_RCD = A3.EMPL_RCD AND A.EFFDT = A3.EFFDT)
    AND EMPLID = :1
- description: >
    Find active employees
  sql: |
    SELECT A.HR_STATUS,  
    FROM PS_JOB A 
    WHERE A.EMPL_RCD = (SELECT MAX(A1.EMPL_RCD) FROM PS_JOB A1 WHERE A.EMPLID =A1.EMPLID) 
    AND A.EFFDT = (SELECT MAX(A2.EFFDT) FROM PS_JOB A2 WHERE A.EMPLID = A2.EMPLID AND A.EMPL_RCD = A2.EMPL_RCD) 
    AND A.EFFSEQ = (SELECT MAX(A3.EFFSEQ) FROM PS_JOB A3 WHERE A.EMPLID = A3.EMPLID AND A.EMPL_RCD = A3.EMPL_RCD AND A.EFFDT = A3.EFFDT)
    AND A.HR_STATUS = 'A'
- description: >
    Find the HR Status and Employee Status of an employee
  sql: |
    SELECT A.HR_STATUS, A.EMPL_STATUS
    FROM PS_JOB A 
    WHERE A.EMPL_RCD = (SELECT MAX(A1.EMPL_RCD) FROM PS_JOB A1 WHERE A.EMPLID =A1.EMPLID) 
    AND A.EFFDT = (SELECT MAX(A2.EFFDT) FROM PS_JOB A2 WHERE A.EMPLID = A2.EMPLID AND A.EMPL_RCD = A2.EMPL_RCD) 
    AND A.EFFSEQ = (SELECT MAX(A3.EFFSEQ) FROM PS_JOB A3 WHERE A.EMPLID = A3.EMPLID AND A.EMPL_RCD = A3.EMPL_RCD AND A.EFFDT = A3.EFFDT)
    AND A.HR_STATUS = 'A'
- description: >
    Retrieves active employees' names, current department names, and current location names by joining their job record with effective-dated department and location tables.
  sql: |
    SELECT
        A.EMPLID,
        A.EMPL_RCD,
        B.NAME,
        C.DEPTID,
        C.DESCR AS DEPARTMENT_NAME,
        D.LOCATION,
        D.DESCR AS LOCATION_NAME
    FROM
        PS_JOB A
    INNER JOIN
        PS_PERSONAL_DATA B ON A.EMPLID = B.EMPLID
    INNER JOIN
        PS_DEPT_TBL C ON A.DEPTID = C.DEPTID
        AND C.EFFDT = (SELECT MAX(C1.EFFDT) FROM PS_DEPT_TBL C1 WHERE C.DEPTID = C1.DEPTID AND C1.EFFDT <= SYSDATE)
    INNER JOIN
        PS_LOCATION_TBL D ON A.LOCATION = D.LOCATION
        AND D.EFFDT = (SELECT MAX(D1.EFFDT) FROM PS_LOCATION_TBL D1 WHERE D.LOCATION = D1.LOCATION AND D1.EFFDT <= SYSDATE)
    WHERE
        A.EFFDT = (SELECT MAX(A1.EFFDT) FROM PS_JOB A1 WHERE A.EMPLID = A1.EMPLID AND A.EMPL_RCD = A1.EMPL_RCD AND A1.EFFDT <= SYSDATE)
        AND A.EFFSEQ = (SELECT MAX(A2.EFFSEQ) FROM PS_JOB A2 WHERE A.EMPLID = A2.EMPLID AND A.EMPL_RCD = A2.EMPL_RCD AND A.EFFDT = A2.EFFDT)
        AND A.HR_STATUS = 'A'; -- 'A' for Active,
- description: >
    Finds employees whose initial hire date falls within a given start and end date.
  sql: |
    SELECT
        A.EMPLID,
        B.NAME,
        A.HIRE_DT,
        A.LAST_HIRE_DT
    FROM
        PS_EMPLOYMENT A
    INNER JOIN
        PS_PERSONAL_DATA B ON A.EMPLID = B.EMPLID
    WHERE
        A.HIRE_DT BETWEEN TO_DATE(:1, 'YYYY-MM-DD') AND TO_DATE(:2, 'YYYY-MM-DD'),
- description: >
    Lists employees and their current compensation rate for a specified department, considering effective dating for the job record.
  sql: |
    SELECT
        A.EMPLID,
        B.NAME,
        A.DEPTID,
        A.COMP_RATE
    FROM
        PS_JOB A
    INNER JOIN
        PS_PERSONAL_DATA B ON A.EMPLID = B.EMPLID
    WHERE
        A.EFFDT = (SELECT MAX(A1.EFFDT) FROM PS_JOB A1 WHERE A.EMPLID = A1.EMPLID AND A.EMPL_RCD = A1.EMPL_RCD AND A1.EFFDT <= SYSDATE)
        AND A.EFFSEQ = (SELECT MAX(A2.EFFSEQ) FROM PS_JOB A2 WHERE A.EMPLID = A2.EMPLID AND A.EMPL_RCD = A2.EMPL_RCD AND A.EFFDT = A2.EFFDT)
        AND A.DEPTID = :1; -- Bind to a specific department ID,
- description: >
    Shows all calculated earnings and deductions, including their original and resolved amounts, for a given employee and payroll run.
  sql: |
    SELECT
        A.EMPLID,
        A.CAL_RUN_ID,
        A.GP_PAY_ENTITY,
        A.CAL_ID,
        A.PIN_NUM,
        B.PIN_NM, -- Joins to get the element name from configuration
        A.ORIGINAL_AMOUNT,
        A.RESOLVED_AMOUNT
    FROM
        PS_GP_RSLT_ERN_DED A
    INNER JOIN
        PS_GP_PIN B ON A.PIN_NUM = B.PIN_NUM -- Assumes PS_GP_PIN is the element definition table
    WHERE
        A.EMPLID = :1
        AND A.CAL_RUN_ID = :2,
- description: >
    Provides the processing status and error flag for each payee within a specified payroll calendar run.       
  sql: |
    SELECT
        A.EMPLID,
        A.CAL_RUN_ID,
        A.CAL_ID,
        A.PROCESS_STATUS, -- Status like 'F' (Finalized), 'I' (Identified), 'C' (Calculated)
        A.ERROR_FLAG
    FROM
        PS_GP_PYE_PRC_STAT A
    WHERE
        A.CAL_RUN_ID = :1,
- description: >
    Lists all performance appraisals for a specific employee, including their type, period, and current processing status.
  sql: |
    SELECT
        A.EP_APPR_ID,
        A.EMPLID,
        A.EP_APPR_TYPE,
        A.EP_APPR_BEGIN_DT,
        A.EP_APPR_END_DT,
        A.EP_APPR_STATUS -- e.g., 'INP' (In Progress), 'COMP' (Completed), 'CANC' (Canceled)
    FROM
        PS_EP_APPR A
    WHERE
        A.EMPLID = :1
    ORDER BY
        A.EP_APPR_BEGIN_DT DESC,
- description: >
    Retrieves all rated items, their ratings, and any associated comments for a given performance appraisal document.
  sql: |
    SELECT
        A.EP_APPR_ID,
        A.EP_SECTION_ID,
        A.EP_ITEM_ID,
        A.EP_TITLE,
        A.EP_RATING_MODEL,
        A.EP_RATING,
        B.EP_COMMENT_TXT
    FROM
        PS_EP_APPR_ITEM A
    LEFT OUTER JOIN
        PS_EP_APPR_COMMENT B
        ON A.EP_APPR_ID = B.EP_APPR_ID
        AND A.EP_SECTION_ID = B.EP_SECTION_ID
        AND A.EP_ITEM_ID = B.EP_ITEM_ID
        -- You might need to add role/sequence conditions if comments can be duplicated by role
    WHERE
        A.EP_APPR_ID = :1; -- Bind to a specific appraisal ID,
- description: >
    Finds the EMPLID (and associated name details) for individuals matching a specified first name and last name, performing a case-insensitive search.
  sql: |
    SELECT
        A.EMPLID,
        A.NAME,
        A.LAST_NAME,
        A.FIRST_NAME
    FROM
        PS_PERSONAL_DATA A
    WHERE
        A.SEARCH_FIRST_NAME LIKE UPPER(:1) || '%' -- Convert input to uppercase for comparison
        AND A.SEARCH_LAST_NAME LIKE UPPER(:2) || '%'; -- Convert input to uppercase for comparison,
- description: >
    Retrieves the latest effective-dated version of all active contracts for a specified employee, ensuring the contract status is 'Active' and its end date is in the future or undefined.
  sql: |
    SELECT
        A.EMPLID,
        B.NAME,
        A.CONTRACT_SEQ_NUM,
        A.CONTRACT_TYPE,
        A.CONTRACT_BEGIN_DT,
        A.CONTRACT_END_DT,
        A.CONTRACT_STATUS,
        A.NOTICE_PERIOD,
        A.FULL_PART_TIME -- Common field for full-time/part-time status
    FROM
        PS_CONTRACT A
    INNER JOIN
        PS_PERSONAL_DATA B ON A.EMPLID = B.EMPLID
    WHERE
        A.EMPLID = :1 -- Bind to the specific Employee ID
        AND A.EFFDT = (
            SELECT MAX(A1.EFFDT)
            FROM PS_CONTRACT A1
            WHERE A1.EMPLID = A.EMPLID
              AND A1.CONTRACT_SEQ_NUM = A.CONTRACT_SEQ_NUM
              AND A1.EFFDT <= SYSDATE -- Get the most current effective row as of today
        )
        AND A.EFFSEQ = (
            SELECT MAX(A2.EFFSEQ)
            FROM PS_CONTRACT A2
            WHERE A2.EMPLID = A.EMPLID
              AND A2.CONTRACT_SEQ_NUM = A.CONTRACT_SEQ_NUM
              AND A2.EFFDT = A.EFFDT
        )
        AND A.CONTRACT_STATUS = 'A' -- Assuming 'A' means Active
        AND (A.CONTRACT_END_DT >= SYSDATE OR A.CONTRACT_END_DT IS NULL); -- Contract is not expired or has no end date,
- description: >
    Identifies and lists active employee contracts that have a defined end date falling within the next 30 days from the current date.
  sql: |
    SELECT
        A.EMPLID,
        B.NAME,
        A.CONTRACT_SEQ_NUM,
        A.CONTRACT_TYPE,
        A.CONTRACT_BEGIN_DT,
        A.CONTRACT_END_DT,
        A.CONTRACT_STATUS
    FROM
        PS_CONTRACT A
    INNER JOIN
        PS_PERSONAL_DATA B ON A.EMPLID = B.EMPLID
    WHERE
        A.EFFDT = (
            SELECT MAX(A1.EFFDT)
            FROM PS_CONTRACT A1
            WHERE A1.EMPLID = A.EMPLID
              AND A1.CONTRACT_SEQ_NUM = A.CONTRACT_SEQ_NUM
              AND A1.EFFDT <= SYSDATE
        )
        AND A.EFFSEQ = (
            SELECT MAX(A2.EFFSEQ)
            FROM PS_CONTRACT A2
            WHERE A2.EMPLID = A.EMPLID
              AND A2.CONTRACT_SEQ_NUM = A.CONTRACT_SEQ_NUM
              AND A2.EFFDT = A.EFFDT
        )
        AND A.CONTRACT_STATUS = 'A' -- Only look at active contracts
        AND A.CONTRACT_END_DT IS NOT NULL -- Must have an end date
        AND A.CONTRACT_END_DT BETWEEN SYSDATE AND SYSDATE + 30; -- Ends within the next 30 days,
- description: >
    Provides a list of all active departments, showing their ID, name, and the set ID they belong to, based on their latest effective-dated record.
  sql: |
    SELECT
        A.DEPTID,
        A.DESCR AS Department_Name,
        A.SETID,
        A.EFF_STATUS -- Should be 'A' for Active
    FROM
        PS_DEPT_TBL A
    WHERE
        A.EFFDT = (
            SELECT MAX(A1.EFFDT)
            FROM PS_DEPT_TBL A1
            WHERE A.SETID = A1.SETID
              AND A.DEPTID = A1.DEPTID
              AND A1.EFFDT <= TO_DATE('2025-05-22', 'YYYY-MM-DD') -- Current date: Thursday, May 22, 2025
        )
        AND A.EFF_STATUS = 'A' -- Ensure the effective status is Active
    ORDER BY
        A.DESCR,
- description: >
    Counts the number of active employees and groups them by their currently assigned company, location, and department, providing a summarized organizational view.
  sql: |
    SELECT
        C.DESCR AS Company_Name,
        L.DESCR AS Location_Name,
        D.DESCR AS Department_Name,
        COUNT(DISTINCT J.EMPLID) AS Number_of_Employees
    FROM
        PS_JOB J
    INNER JOIN
        PS_COMPANY_TBL C ON J.COMPANY = C.COMPANY
        AND C.EFFDT = (
            SELECT MAX(C1.EFFDT)
            FROM PS_COMPANY_TBL C1
            WHERE C.COMPANY = C1.COMPANY
              AND C1.EFFDT <= TO_DATE('2025-05-22', 'YYYY-MM-DD')
        )
    INNER JOIN
        PS_LOCATION_TBL L ON J.LOCATION = L.LOCATION
        AND L.EFFDT = (
            SELECT MAX(L1.EFFDT)
            FROM PS_LOCATION_TBL L1
            WHERE L.LOCATION = L1.LOCATION
              AND L1.EFFDT <= TO_DATE('2025-05-22', 'YYYY-MM-DD')
        )
    INNER JOIN
        PS_DEPT_TBL D ON J.DEPTID = D.DEPTID
        AND D.EFFDT = (
            SELECT MAX(D1.EFFDT)
            FROM PS_DEPT_TBL D1
            WHERE D.DEPTID = D1.DEPTID
              AND D1.EFFDT <= TO_DATE('2025-05-22', 'YYYY-MM-DD')
        )
    WHERE
        J.EFFDT = (
            SELECT MAX(J1.EFFDT)
            FROM PS_JOB J1
            WHERE J.EMPLID = J1.EMPLID
              AND J.EMPL_RCD = J1.EMPL_RCD
              AND J1.EFFDT <= TO_DATE('2025-05-22', 'YYYY-MM-DD')
        )
        AND J.EFFSEQ = (
            SELECT MAX(J2.EFFSEQ)
            FROM PS_JOB J2
            WHERE J.EMPLID = J2.EMPLID
              AND J.EMPL_RCD = J2.EMPL_RCD
              AND J.EFFDT = J2.EFFDT
        )
        AND J.HR_STATUS = 'A' -- Only count active employees
    GROUP BY
        C.DESCR, L.DESCR, D.DESCR
    ORDER BY
        C.DESCR, L.DESCR, D.DESCR,
- description: >
    Lists all active employees with their direct active managers, providing a simple, two-level reporting structure based on the SUPERVISOR_ID in the PS_JOB table.
  sql: |
    SELECT
        MGR_PD.NAME AS Manager_Name,
        MGR_JOB.EMPLID AS Manager_ID,
        MGR_JOB.JOBCODE AS Manager_Job_Code,
        EMP_PD.NAME AS Employee_Name,
        EMP_JOB.EMPLID AS Employee_ID,
        EMP_JOB.JOBCODE AS Employee_Job_Code
    FROM
        PS_JOB EMP_JOB -- Employee's job record
    INNER JOIN
        PS_PERSONAL_DATA EMP_PD ON EMP_JOB.EMPLID = EMP_PD.EMPLID
    INNER JOIN
        PS_JOB MGR_JOB -- Manager's job record
        ON EMP_JOB.SUPERVISOR_ID = MGR_JOB.EMPLID
    INNER JOIN
        PS_PERSONAL_DATA MGR_PD ON MGR_JOB.EMPLID = MGR_PD.EMPLID
    WHERE
        -- Get current job record for the employee
        EMP_JOB.EFFDT = (
            SELECT MAX(EMP1.EFFDT)
            FROM PS_JOB EMP1
            WHERE EMP_JOB.EMPLID = EMP1.EMPLID
              AND EMP_JOB.EMPL_RCD = EMP1.EMPL_RCD
              AND EMP1.EFFDT <= TO_DATE('2025-05-22', 'YYYY-MM-DD')
        )
        AND EMP_JOB.EFFSEQ = (
            SELECT MAX(EMP2.EFFSEQ)
            FROM PS_JOB EMP2
            WHERE EMP_JOB.EMPLID = EMP2.EMPLID
              AND EMP_JOB.EMPL_RCD = EMP2.EMPL_RCD
              AND EMP_JOB.EFFDT = EMP2.EFFDT
        )
        AND EMP_JOB.HR_STATUS = 'A' -- Only active employees
        AND EMP_JOB.SUPERVISOR_ID IS NOT NULL -- Ensure they have a supervisor assigned
        -- Get current job record for the manager
        AND MGR_JOB.EFFDT = (
            SELECT MAX(MGR1.EFFDT)
            FROM PS_JOB MGR1
            WHERE MGR_JOB.EMPLID = MGR1.EMPLID
              AND MGR_JOB.EMPL_RCD = MGR1.EMPL_RCD
              AND MGR1.EFFDT <= TO_DATE('2025-05-22', 'YYYY-MM-DD')
        )
        AND MGR_JOB.EFFSEQ = (
            SELECT MAX(MGR2.EFFSEQ)
            FROM PS_JOB MGR2
            WHERE MGR_JOB.EMPLID = MGR2.EMPLID
              AND MGR_JOB.EMPL_RCD = MGR2.EMPL_RCD
              AND MGR_JOB.EFFDT = MGR2.EFFDT
        )
        AND MGR_JOB.HR_STATUS = 'A' -- Only active managers
    ORDER BY
        Manager_Name, Employee_Name,
- description: >
    Lists all active dependents for a given employee, providing their personal details (name, birthdate, gender, relationship) and relevant fiscal information such as their National ID and Tax ID number.
  sql: |
    SELECT
        A.EMPLID,
        E.NAME AS Employee_Name,
        A.DEPENDENT_BENEF AS Dependent_ID,
        A.NAME AS Dependent_Full_Name,
        A.BIRTHDATE AS Dependent_Birthdate,
        A.SEX AS Dependent_Gender,
        A.MAR_STATUS AS Marital_Status_Code, -- This is typically a Translate value (e.g., 'S', 'M', 'D')
        A.RELATIONSHIP AS Relationship_Code, -- This is typically a Translate value (e.g., 'C' for Child, 'SP' for Spouse)
        A.DEP_BENEF_TYPE AS Dependent_Type_Code, -- 'D' for Dependent, 'B' for Beneficiary, etc.
        B.NATIONAL_ID AS Dependent_National_ID,  -- This is the correct field for Dependent National ID
        B.NATIONAL_ID_TYPE AS National_ID_Type,
        B.COUNTRY AS Dependent_Country_Code,
        A.STUDENT AS Is_Student_Flag, -- 'Y' if dependent is a student
        A.DISABLED AS Is_Disabled_Flag, -- 'Y' if dependent is disabled
        A.SMOKER AS Smoker_Status_Code, -- Often used for benefit premium calculations
        A.MARITAL_STATUS AS Marital_Status -- 'M' if married, 'S' if single
    FROM
        PS_DEPENDENT_BENEF A
    INNER JOIN
        PS_PERSONAL_DATA E ON A.EMPLID = E.EMPLID
    LEFT JOIN 
      PS_DEP_BENEF_NID B ON A.EMPLID = B.EMPLID AND A.DEPENDENT_BENEF = B.DEPENDENT_BENEF
    WHERE
        A.EMPLID = 'KE0004'
    ORDER BY
        A.NAME,

- description: >
    List all active users in the system.
  sql: |
    SELECT OPRID, OPRDEFNDESC
    FROM PSOPRDEFN
    WHERE ACCTLOCK = 0
- description: >
    Find the application user with the employee ID.
  sql: |
    SELECT OPRID, OPRDEFNDESC
    FROM PSOPRDEFN
    WHERE EMPLID = :1     