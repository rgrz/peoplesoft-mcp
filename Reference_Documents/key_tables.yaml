PS_PERSONAL_DATA:
  description: Stores employee personal information such as name, address, birthdate, etc.
  index: EMPLID
  key_columns:
    EMPLID: Employee ID
    NAME: Full name
    NAME_DISPLAY: Name in display format
    ADDRESS1: Primary address line 1
    CITY: City
    STATE: State
    POSTAL: Postal code
    SEX: Sex
    MAR_STATUS: Marital Status
    BIRTHDATE: Birthdate

PS_JOB:
  description: Job and employment data for employees
  index: EMPLID, EMPL_RCD, EFFDT, EFFSEQ
  key_columns:
    EMPLID: Employee ID
    EFFDT: Effective date
    PER_ORG: Employee Type
    DEPTID: Department ID
    JOBCODE: Job Code
    LOCATION: Location
    SUPERVISOR_ID: Employee ID of the Supervisor
    SHIFT: Shift
    REG_TEMP: Regular/Temporary
    COMPANY: Company
    PAYGROUP: Pay Group
    EMPL_CLASS: Employee Class
    SAL_ADMIN_PLAN: Salary Administration Plan
    GRADE: Salary Grade
    STEP: Grade Step
    COMPRATE: Compensation Rate
    ANNUAL_RT: Annual Rate
    MONTHLY_RT: Monthly Rate

PS_DEPT_TBL:
  description: Stores department information
  index: SETID, DEPTID, EFFDT
  key_columns:
    SETID: Set ID
    DEPTID: Department ID
    EFFDT: Effective Date
    DESCR: Department Description
    DESCRSHORT: Short Description

PS_JOBCODE_TBL:
  description: Stores job code definitions and related data
  index: SETID, JOBCODE, EFFDT
  key_columns:
    SETID: Set ID
    JOBCODE: Job Code
    EFFDT: Effective Date
    DESCR: Job Description

PS_POSITION_DATA:
  description: Stores position data for each business unit
  index: POSITION_NBR, EFFDT
  key_columns:
    POSITION_NBR: Position Number
    EFF_STATUS: 
    DESCR: Position Description
    BUSINESS_UNIT:
    DEPTID:
    JOBCODE:
    REPORTS_TO:
    LOCATION:

PS_BEN_PROG_PARTIC:
  description: Stores employee participation in benefit programs
  index: EMPLID, EMPL_RCD
  key_columns:
    EMPLID: Employee ID
    BENEFIT_PROGRAM: Benefit Program ID
    EFFDT: Effective Date

PS_ADDRESS:
  description: Stores address information with different address types
  index: EMPLID, ADDRESS_TYPE, EFFDT
  key_columns:
    EMPLID: Employee ID
    ADDRESS_TYPE: Address Type (e.g., Permanent, Mailing)

PS_LOCATION_TBL:
  description: Stores location information
  index: SETID, LOCATION, EFFDT
  key_columns:
    SETID: Set ID
    LOCATION: Location Code

PS_COMPANY_TBL:
  description: Stores company information
  index: SETID, COMPANY, EFFDT
  key_columns:
    SETID: Set ID
    COMPANY: Company Code

